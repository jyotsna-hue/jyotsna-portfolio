<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8; --ink: #1A1814; --warm-gray: #8A8070;
      --accent: #C4622D; --accent-light: #E8956A; --accent-pale: #F5E6D8;
      --border: rgba(26,24,20,0.12); --border-strong: rgba(26,24,20,0.25);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --nav-h: 72px;
      --t: 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; overflow-x: hidden; }

    /* ── LOADING ── */
    #loader {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .loader-name { font-family: var(--serif); font-size: 2rem; font-weight: 300; color: var(--ink); letter-spacing: 0.04em; }
    .loader-name span { color: var(--accent); font-style: italic; }
    .loader-bar { width: 120px; height: 1px; background: var(--border); margin: 16px auto 0; overflow: hidden; }
    .loader-fill { height: 100%; background: var(--accent); animation: load 1.2s ease forwards; }
    @keyframes load { from{width:0} to{width:100%} }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(24px,5vw,72px); z-index: 100;
      background: rgba(245,240,232,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); transition: box-shadow var(--t);
    }
    nav.scrolled { box-shadow: 0 4px 32px rgba(26,24,20,0.08); }
    .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 500; letter-spacing: 0.02em; color: var(--ink); text-decoration: none; cursor: pointer; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 0.85rem; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; color: var(--warm-gray); text-decoration: none; transition: color var(--t); position: relative; }
    .nav-links a::after { content:''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform var(--t); }
    .nav-links a:hover { color: var(--ink); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--ink); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 1.5px; background: var(--ink); transition: var(--t); }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px,4.5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px,-4.5px); }
    .mobile-menu { position: fixed; top: var(--nav-h); left: 0; right: 0; background: var(--cream); border-bottom: 1px solid var(--border); padding: 24px clamp(24px,5vw,72px); display: none; flex-direction: column; gap: 20px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-size: 1.05rem; color: var(--ink); text-decoration: none; }

    /* ── PAGES ── */
    .page { display: none; padding-top: var(--nav-h); min-height: 100vh; }
    .page.active { display: block; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 clamp(24px,5vw,72px); }
    section { padding: clamp(60px,8vw,120px) 0; }
    .section-label { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .section-title { font-family: var(--serif); font-size: clamp(2rem,4vw,3.2rem); font-weight: 400; line-height: 1.15; color: var(--ink); margin-bottom: 48px; }
    .divider { width: 100%; height: 1px; background: var(--border); margin: 48px 0; }

    /* ── HOME ── */
    .hero { min-height: calc(100vh - var(--nav-h)); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; padding: 80px clamp(24px,5vw,72px); max-width: 1180px; margin: 0 auto; }
    .hero-tag { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: var(--accent-pale); padding: 6px 14px; border-radius: 2px; margin-bottom: 28px; }
    .hero-tag::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .hero-name { font-family: var(--serif); font-size: clamp(3rem,6vw,5.5rem); font-weight: 300; line-height: 1.05; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 20px; }
    .hero-name em { font-style: italic; color: var(--accent); }
    .hero-headline { font-size: 1.05rem; font-weight: 300; color: var(--warm-gray); margin-bottom: 36px; max-width: 420px; line-height: 1.7; }
    .hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--ink); color: var(--cream); padding: 14px 28px; font-family: var(--sans); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: background var(--t); }
    .btn-primary:hover { background: var(--accent); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--ink); padding: 13px 28px; font-family: var(--sans); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--border-strong); cursor: pointer; transition: var(--t); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .social-strip { display: flex; gap: 20px; margin-top: 48px; }
    .social-link { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border: 1px solid var(--border); color: var(--warm-gray); text-decoration: none; transition: var(--t); }
    .social-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .hero-right { display: flex; flex-direction: column; gap: 32px; }
    .profile-card { border: 1px solid var(--border); overflow: hidden; background: white; }
    .profile-photo-area { height: 500px; background: linear-gradient(135deg,#EDE8DE,#D4C9B5); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .profile-photo-area img {
  width: 100%;
  height: auto;
  object-fit: contain;
}
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .photo-placeholder svg { opacity: .4; }
    .photo-placeholder span { font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; color: var(--warm-gray); text-transform: uppercase; }
    .voice-card { border: 1px solid var(--border); padding: 24px; background: white; }
    .voice-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 12px; }
    .voice-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; margin-bottom: 16px; color: var(--ink); font-style: italic; }
    .audio-player { display: flex; align-items: center; gap: 12px; }
    .play-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--ink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--t); }
    .play-btn:hover { background: var(--accent); }
    .play-btn svg { width: 14px; height: 14px; fill: white; margin-left: 2px; }
    .progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width .1s linear; }
    .progress-time { font-family: var(--mono); font-size: .7rem; color: var(--warm-gray); flex-shrink: 0; }
    .working-on { border: 1px solid var(--border); padding: 24px; background: white; }
    .working-on-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .working-items { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .working-items li { display: flex; align-items: flex-start; gap: 10px; font-size: .9rem; color: var(--warm-gray); line-height: 1.5; }
    .working-items li::before { content:'→'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
    .featured-section { background: var(--ink); padding: 80px clamp(24px,5vw,72px); }
    .featured-inner { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .featured-label { font-family: var(--mono); font-size: .75rem; letter-spacing: .14em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 16px; }
    .featured-title { font-family: var(--serif); font-size: clamp(1.8rem,3vw,2.8rem); font-weight: 400; color: var(--cream); margin-bottom: 16px; line-height: 1.2; }
    .featured-desc { color: rgba(245,240,232,.55); font-size: .95rem; line-height: 1.7; margin-bottom: 32px; }
    .featured-image { aspect-ratio: 16/10; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color var(--t); overflow: hidden; }
    .featured-image iframe {
  height: 100%;
  aspect-ratio: 9 / 16;
  max-width: 100%;
  border: none;
}
    .featured-image:hover { border-color: var(--accent-light); }
    .featured-image img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #111;
}
    .featured-image span { font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,240,232,.25); }

    /* ── ABOUT ── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .about-sticky { position: sticky; top: calc(var(--nav-h) + 40px); }
    .about-photo { width: 100%; aspect-ratio: 3/4; background: linear-gradient(135deg,#EDE8DE,#D4C9B5); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; overflow: hidden; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; }
    .about-text { font-size: 1.05rem; line-height: 1.85; color: var(--warm-gray); margin-bottom: 48px; }
    .about-text p + p { margin-top: 20px; }
    .skills-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 48px; }
    .skill-tag { padding: 10px 16px; border: 1px solid var(--border); font-size: .85rem; color: var(--warm-gray); transition: var(--t); }
    .skill-tag:hover { border-color: var(--accent); color: var(--accent); }
    .tools-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 48px; }
    .tool-chip { padding: 6px 14px; background: var(--accent-pale); font-family: var(--mono); font-size: .75rem; letter-spacing: .06em; color: var(--accent); }
    .product-philosophy { background: var(--ink); color: var(--cream); padding: 32px; font-family: var(--serif); font-size: 1.15rem; font-weight: 300; line-height: 1.7; font-style: italic; }

    /* ── PROJECTS ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); gap: 32px; border: 1px solid var(--border); }
    .project-card { background: white; cursor: pointer; transition: var(--t); border: 1px solid transparent; position: relative; overflow: hidden; }
    .project-card:hover { border-color: var(--accent); z-index: 1; }
    .project-card:hover .project-card-img { transform: scale(1.03); }
    .project-img-wrap { overflow: hidden; aspect-ratio: 220px; }
    .project-card-img { width: 100%; height: 100%; object-fit: cover; background: linear-gradient(135deg,#EDE8DE,#C9C0AF); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; color: rgba(26,24,20,.3); text-transform: uppercase; transition: transform var(--t); }
    .project-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .project-card-body { padding: 24px; }
    .project-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .project-tag { font-family: var(--mono); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); background: var(--accent-pale); padding: 3px 10px; }
    .project-card-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 500; color: var(--ink); margin-bottom: 8px; line-height: 1.3; }
    .project-card-desc { font-size: .88rem; color: var(--warm-gray); line-height: 1.65; }
    .project-arrow { position: absolute; bottom: 24px; right: 24px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--ink); color: var(--cream); opacity: 0; transform: translateX(-8px); transition: var(--t); font-size: .9rem; }
    .project-card:hover .project-arrow { opacity: 1; transform: translateX(0); }

    /* Project Detail */
    .detail-hero { background: var(--ink); padding: 80px clamp(24px,5vw,72px); color: var(--cream); }
    .detail-back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,240,232,.5); cursor: pointer; margin-bottom: 48px; transition: color var(--t); border: none; background: none; }
    .detail-back:hover { color: var(--accent-light); }
    .detail-title { font-family: var(--serif); font-size: clamp(2.5rem,5vw,4.5rem); font-weight: 300; line-height: 1.1; max-width: 800px; margin-bottom: 32px; }
    .detail-meta { display: flex; gap: 32px; flex-wrap: wrap; }
    .detail-meta-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-meta-label { font-family: var(--mono); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(245,240,232,.35); }
    .detail-meta-value { font-size: .95rem; color: rgba(245,240,232,.75); }
    .detail-body { max-width: 780px; margin: 0 auto; padding: 80px clamp(24px,5vw,72px); }
    .detail-section { margin-bottom: 56px; }
    .detail-section-label { font-family: var(--mono); font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .detail-section-content { font-size: 1rem; line-height: 1.85; color: var(--warm-gray); }
    .metrics-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 16px; }
    .metric-item { background: white; padding: 24px; text-align: center; }
    .metric-value { font-family: var(--serif); font-size: 2.5rem; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 8px; }
    .metric-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--warm-gray); }

    /* ── PRODUCT THINKING ── */
    .thinking-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); gap: 24px; }
    .thinking-card { border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: var(--t); background: white; }
    .thinking-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 48px rgba(26,24,20,.08); }
    .thinking-card-img { aspect-ratio: 16/9; background: linear-gradient(135deg,#EDE8DE,#C9C0AF); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .7rem; color: rgba(26,24,20,.3); text-transform: uppercase; letter-spacing: .1em; overflow: hidden; }
    .thinking-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .thinking-card-body { padding: 24px; }
    .thinking-product { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .thinking-card-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 500; color: var(--ink); margin-bottom: 10px; }
    .thinking-card-summary { font-size: .88rem; color: var(--warm-gray); line-height: 1.65; }
    .case-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: 0.2s;
}

.case-link:hover {
  border-bottom: 1px solid var(--accent);
}

    /* ── EXPERIENCE ── */
    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 80px; }
    .exp-card { border: 1px solid var(--border); overflow: hidden; background: white; }
    .exp-cert { overflow: hidden; }
    .exp-cert iframe { width: 100%; height: 300px; border: none; display: block; }
    .cert-hint { font-family: var(--mono); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); padding: 8px 16px; background: var(--accent-pale); text-align: center; cursor: pointer; }
    .exp-card-body { padding: 24px; }
    .exp-role { font-family: var(--sans); font-size: .85rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .exp-org { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; color: var(--ink); margin-bottom: 12px; }
    .exp-learnings { font-size: .88rem; color: var(--warm-gray); line-height: 1.7; }
    .hack-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
    .hack-card { border: 1px solid var(--border); overflow: hidden; background: white; }
    .hack-img { aspect-ratio: 1; overflow: hidden; background: #000; }
    .hack-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform var(--t); }
    .hack-card:hover .hack-img img { transform: scale(1.04); }
    .hack-body { padding: 20px; }
    .hack-event { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .hack-learnings { font-size: .85rem; color: var(--warm-gray); line-height: 1.65; }

    /* ── CONTACT ── */
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .testimonial-card { border: 1px solid var(--border); padding: 28px; position: relative; margin-bottom: 24px; }
    .testimonial-card::before { content:'"'; font-family: var(--serif); font-size: 4rem; line-height: 1; color: var(--accent-pale); position: absolute; top: 12px; left: 24px; }
    .testimonial-text { font-family: var(--serif); font-size: 1.05rem; font-style: italic; color: var(--warm-gray); line-height: 1.7; margin-bottom: 20px; padding-top: 24px; }
    .testimonial-name { font-size: .9rem; font-weight: 500; color: var(--ink); }
    .testimonial-role-tag { font-family: var(--mono); font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: var(--warm-gray); }
    .extras-item { padding: 16px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 16px; }
    .extras-icon { width: 32px; height: 32px; background: var(--accent-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); font-size: .9rem; }
    .extras-text { font-size: .9rem; color: var(--warm-gray); line-height: 1.6; }
    .extras-text strong { color: var(--ink); font-weight: 500; }
    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--warm-gray); }
    .form-input, .form-textarea { background: white; border: 1px solid var(--border); padding: 14px 18px; font-family: var(--sans); font-size: .95rem; color: var(--ink); outline: none; transition: border-color var(--t); width: 100%; }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 140px; }
    .form-success { display: none; padding: 16px; background: var(--accent-pale); border: 1px solid var(--accent); font-family: var(--mono); font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
    .contact-socials { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
    .contact-social-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border: 1px solid var(--border); font-family: var(--mono); font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: var(--warm-gray); text-decoration: none; transition: var(--t); }
    .contact-social-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── FOOTER ── */
    footer { background: var(--ink); color: var(--cream); padding: 48px clamp(24px,5vw,72px); }
    .footer-inner { max-width: 1180px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 32px; }
    .footer-name { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--cream); margin-bottom: 6px; }
    .footer-detail { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,240,232,.35); }
    .footer-available { display: inline-flex; align-items: center; gap: 8px; background: rgba(196,98,45,.15); border: 1px solid rgba(196,98,45,.3); padding: 8px 20px; font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-light); }
    .footer-available::before { content:''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); animation: pulse 2s ease-in-out infinite; }
    .footer-socials { display: flex; gap: 16px; }
    .footer-social { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(245,240,232,.15); color: rgba(245,240,232,.5); text-decoration: none; transition: var(--t); }
    .footer-social:hover { border-color: var(--accent-light); color: var(--accent-light); }

    /* ── FADE IN ── */
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeUp .7s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width:900px) {
      .hero { grid-template-columns: 1fr; gap: 48px; }
      .hero-right { order: -1; }
      .about-grid { grid-template-columns: 1fr; }
      .about-sticky { position: relative; top: auto; }
      .exp-grid { grid-template-columns: 1fr; }
      .hack-grid { grid-template-columns: 1fr 1fr; }
      .featured-inner { grid-template-columns: 1fr; gap: 48px; }
      .contact-layout { grid-template-columns: 1fr; }
      .footer-inner { flex-direction: column; text-align: center; }
      .metrics-grid { grid-template-columns: 1fr; }
    }
    @media (max-width:640px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hack-grid { grid-template-columns: 1fr; }
      .skills-grid { grid-template-columns: 1fr; }
      .projects-grid, .thinking-grid { grid-template-columns: 1fr; }
    }
    
  </style>
</head>

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function img(src, alt, style='') {
  if (!src) return `<div class="photo-placeholder">${ICONS.person}<span>Photo</span></div>`;
  return `<img src="${src}" alt="${alt||''}" style="width:100%;height:auto;object-fit:contain;" loading="lazy">`;
}

function coverImg(src, fallbackText='Cover image') {
  if (src) return `<img src="${src}" alt="${fallbackText}" style="width:100%;height:100%;object-fit:cover;">`;
  return `<span>${fallbackText}</span>`;
}

function footer(d) {
  const socials = (d.social||[]).slice(0,3).map(s =>
    `<a href="${s.url}" class="footer-social" title="${s.label}">${ICONS[s.platform]||''}</a>`
  ).join('');
  return `<footer><div class="footer-inner">
    <div class="footer-left">
      <div class="footer-name">${d.identity.name_line1} ${d.identity.name_line2}</div>
      <div class="footer-detail">${d.identity.location} · ${d.identity.email}</div>
    </div>
    <div><div class="footer-available">Open to PM / APM roles</div></div>
    <div class="footer-socials">${socials}</div>
  </div></footer>`;
}

// ─────────────────────────────────────────────
// PAGE BUILDERS
// ─────────────────────────────────────────────
function buildHome(d) {
  const socials = (d.social||[]).map(s =>
  `<a href="${s.url}" target="_blank" rel="noopener noreferrer" class="social-link" title="${s.label}">
    ${ICONS[s.platform]||''}
  </a>`
).join('');

  const working = (d.currently_working_on||[]).map(i => `<li>${i}</li>`).join('');

  const fp = d.featured_project || {};
  const fpImg = fp.cover_image
    ? `<img src="${fp.cover_image}" alt="${fp.title}" style="width:100%;height:100%;object-fit:cover;">`
    : `<span>Cover image</span>`;

  return `
  <div class="hero">
    <div class="hero-left fade-in">

function projectDetailHTML(p, d) {
  const det = p.detail || {};
  const m   = p.meta   || {};

function row(label, content) {
   if (!content) return '';

    <div class="detail-section-label">${label}</div>
    <div class="detail-section-content">${content}</div>
  </div>`;

  const metrics = (det.metrics||[]).map(m =>
    `<div class="metric-item"><div class="metric-value">${m.value}</div><div class="metric-label">${m.label}</div></div>`

  return `
  <div class="detail-hero">
    <div style="max-width:1180px;margin:0 auto;padding:0 clamp(24px,5vw,72px);">
      <button class="detail-back" onclick="hideProject()">${ICONS.back} Back to Projects</button>

    class="btn-secondary"

</div>
<div class="detail-body">
      ${row('Overview',   det.overview)}
    ${row('Problem Statement', det.problem)}
    ${row('Target Users', det.users)}
    ${row('My Role',    det.my_role)}
    ${row('Approach',   det.approach)}
    ${row('Key Decisions &amp; Tradeoffs', det.decisions)}
    <div class="detail-section">
      <div class="detail-section-label">Outcome &amp; Impact</div>
      <div class="detail-section-content">${det.outcome||''}</div>
      ${metrics ? `<div class="metrics-grid">${metrics}</div>` : ''}

${row('What I Learned', det.learnings)}
  </div>
  ${footer(d)}`;
}

function thinkingDetailHTML(t, d) {
  const det = t.detail || {};
  function row(label, content) {
    if (!content) return '';
    return `<div class="detail-section">
      <div class="detail-section-label">${label}</div>
      <div class="detail-section-content">${content}</div>

  }
  return `
  <div style="background:var(--ink);padding:60px clamp(24px,5vw,72px);">
    <div style="max-width:1180px;margin:0 auto;">

    ${row('User Analysis',      det.user_analysis)}
    ${row('Pain Points',        det.pain_points)}
    ${row('Proposed Solution',  det.proposed_solution)}
    ${row('Expected Impact &amp; Metrics', det.impact_metrics)}
  </div>
  ${footer(d)}`;
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  window.scrollTo(0, 0);
  if (page === 'projects') showProjectsList();
  if (page === 'thinking') showThinkingList();
  return false;
}

function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}

window.addEventListener('scroll', () =>
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20)
);

// ─────────────────────────────────────────────
// AUDIO PLAYER
// ─────────────────────────────────────────────
let _playing = false, _interval, _sim = 0;

function togglePlay() {
  const audio = document.getElementById('audioEl');
  const icon  = document.getElementById('playIcon');
  _playing = !_playing;
  if (_playing) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    if (audio && audio.src && !audio.src.endsWith('/')) {
      audio.play().catch(() => _simulateProgress());
      audio.ontimeupdate = _updateAudio;
      audio.onended = () => { _playing = false; icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>'; };
    } else { _simulateProgress(); }
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    if (audio) audio.pause();
    clearInterval(_interval);
  }
}

function _simulateProgress() {
  clearInterval(_interval);
  _interval = setInterval(() => {
    if (!_playing) { clearInterval(_interval); return; }
    _sim = (_sim + 0.5) % 100;
    const el = document.getElementById('progressFill');
    const tm = document.getElementById('progressTime');
    if (el) el.style.width = _sim + '%';
    if (tm) { const s = Math.floor(_sim * .05 * 60); tm.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
  }, 100);
}

function _updateAudio() {
  const audio = document.getElementById('audioEl');
  if (!audio || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  const el = document.getElementById('progressFill');
  const tm = document.getElementById('progressTime');
  if (el) el.style.width = pct + '%';
  if (tm) { const s = Math.floor(audio.currentTime); tm.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
}

function seekAudio(e) {
  const pct = e.offsetX / e.currentTarget.offsetWidth;
  const audio = document.getElementById('audioEl');
  if (audio && audio.duration) audio.currentTime = pct * audio.duration;
  else _sim = pct * 100;
}

// ─────────────────────────────────────────────
// CONTACT FORM
// ─────────────────────────────────────────────
function submitForm() {
  const n = document.getElementById('contactName').value.trim();
  const e = document.getElementById('contactEmail').value.trim();
  const m = document.getElementById('contactMessage').value.trim();
  if (!n || !e || !m) { alert('Please fill in all fields.'); return; }
  // Connect to Formspree or EmailJS here in production
  const s = document.getElementById('formSuccess');
  if (s) { s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 4000); }
  document.getElementById('contactName').value = '';
  document.getElementById('contactEmail').value = '';
  document.getElementById('contactMessage').value = '';
}

// ─────────────────────────────────────────────
// BOOTSTRAP — load JSON, render everything
// ─────────────────────────────────────────────
async function init() {
  let data;
  try {
    const res = await fetch('portfolio.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch(err) {
    document.getElementById('loader').innerHTML =
      `<div style="text-align:center;padding:40px;">
        <p style="font-family:var(--mono);font-size:.85rem;color:#C4622D;margin-bottom:12px;">Could not load portfolio.json</p>
        <p style="font-family:var(--mono);font-size:.75rem;color:#8A8070;">Make sure portfolio.json is in the same folder as index.html<br>and you're running on a local server (not file://)</p>
      </div>`;
    return;
  }

  _data = data;

  // Page title & favicon
  document.title = data.meta?.title || 'Portfolio';
  if (data.meta?.favicon) {
    const lnk = document.createElement('link');
    lnk.rel = 'icon'; lnk.href = data.meta.favicon;
    document.head.appendChild(lnk);
  }

  // Logo initials from name
  const initials = (data.identity.name_line1[0]||'') + (data.identity.name_line2[0]||'');
  document.getElementById('navLogo').textContent = initials;

  // Nav links
  const pages = [
    { id:'home',       label:'Home'             },
    { id:'about',      label:'About'            },
    { id:'projects',   label:'Projects'         },
    { id:'thinking',   label:'Product Thinking' },
    { id:'experience', label:'Experience'       },
    { id:'contact',    label:'Contact'          },
  ];
  document.getElementById('navLinks').innerHTML = pages.map(p =>
    `<li><a href="#" onclick="navigate('${p.id}');return false;" data-page="${p.id}">${p.label}</a></li>`
  ).join('');
  document.getElementById('mobileMenu').innerHTML = pages.map(p =>
    `<a href="#" onclick="navigate('${p.id}');return false;">${p.label}</a>`
  ).join('');

  // Render pages
  document.getElementById('page-home').innerHTML       = buildHome(data);
  document.getElementById('page-about').innerHTML      = buildAbout(data);
  document.getElementById('page-projects').innerHTML   = buildProjects(data);
  document.getElementById('page-thinking').innerHTML   = buildThinking(data);
  document.getElementById('page-experience').innerHTML = buildExperience(data);
  document.getElementById('page-contact').innerHTML    = buildContact(data);

  // Mark Home as active
  document.querySelector('[data-page="home"]')?.classList.add('active');

  // Hide loader
  const loader = document.getElementById('loader');
  loader.querySelector('.loader-name').innerHTML =
    `${data.identity.name_line1} <span>${data.identity.name_line2}</span>`;
  setTimeout(() => loader.classList.add('hide'), 1200);
}

init();
</script>
